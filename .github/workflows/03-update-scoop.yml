name: 03 更新 Scoop Manifest

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release 版本号（both 模式时忽略）"
        required: false
        type: string
      mode:
        description: "更新模式"
        required: false
        default: "auto"
        type: choice
        options:
          - auto       # 根据 version_tag 自动判断稳定/预览
          - stable     # 仅更新稳定版
          - prerelease # 仅更新预览版
          - both       # 同时拉取最新稳定版和预览版并推送

permissions:
  contents: read

jobs:
  update-bucket:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release'
    steps:
      - name: 生成并推送 Manifest
        env:
          GH_REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.version_tag }}
          INPUT_MODE: ${{ inputs.mode }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          EVENT_IS_PRE: ${{ github.event.release.prerelease }}
          SCOOP_PAT: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -e
          BUCKET_REPO="https://x-access-token:${SCOOP_PAT}@github.com/x6nux/scoop-zedg.git"

          # ── 等待并获取 Windows 产物 URL ────────────────────────────
          fetch_assets() {
            local tag="$1" i json
            for i in $(seq 1 20); do
              json=$(curl -s "https://api.github.com/repos/${GH_REPO}/releases/tags/$tag")
              ASSET_X64=$(echo "$json" | jq -r '.assets[]|select(.name|test("windows-x86_64.*\\.zip"))|.browser_download_url')
              ASSET_ARM64=$(echo "$json" | jq -r '.assets[]|select(.name|test("windows-aarch64.*\\.zip"))|.browser_download_url')
              [ -n "$ASSET_X64" ] && [ "$ASSET_X64" != "null" ] && return 0
              echo "[$i/20] $tag 产物未就绪，等待 15s..."; sleep 15
            done
            echo "::error::未找到 $tag 的 Windows x64 产物"; return 1
          }

          # ── 计算远程文件 SHA256 ────────────────────────────────────
          remote_sha256() {
            local tmp; tmp=$(mktemp)
            curl -sL -o "$tmp" "$1"
            sha256sum "$tmp" | awk '{print $1}'
            rm "$tmp"
          }

          # ── 生成单个 manifest ──────────────────────────────────────
          make_manifest() {
            local tag="$1" is_pre="$2" out="$3"
            local clean="${tag#v}"
            local repo_url="https://github.com/${GH_REPO}"
            local desc="Zed Editor (Localized / 汉化版)"
            [ "$is_pre" = "true" ] && desc="$desc - Preview"

            fetch_assets "$tag"
            local hash_x64; hash_x64=$(remote_sha256 "$ASSET_X64")

            # autoupdate 模板中 $version 是 Scoop 占位符，需对 shell 转义
            local au_x64_url="${repo_url}/releases/download/v\$version/zedg-zh-cn-windows-x86_64-v\$version.zip"
            local au_x64_hash="${repo_url}/releases/download/v\$version/sha256sums.txt"
            local au_x64_regex='([a-f0-9]{64})\s+zedg-zh-cn-windows-x86_64-v\$version\.zip'

            local manifest
            manifest=$(jq -n \
              --arg version  "$clean" \
              --arg desc     "$desc" \
              --arg homepage "$repo_url" \
              --arg url_x64  "$ASSET_X64" \
              --arg hash_x64 "$hash_x64" \
              --arg au_url   "$au_x64_url" \
              --arg au_hash  "$au_x64_hash" \
              --arg au_regex "$au_x64_regex" \
              '{
                version: $version, description: $desc,
                homepage: $homepage, license: "GPL-3.0-only",
                architecture: {"64bit": {url: $url_x64, hash: $hash_x64}},
                bin: "ZedG.exe", shortcuts: [["ZedG.exe", "ZedG"]],
                checkver: {github: $homepage},
                autoupdate: {architecture: {"64bit": {
                  url: $au_url, hash: {url: $au_hash, regex: $au_regex}
                }}}
              }')

            # 若有 ARM64 产物则追加
            if [ -n "$ASSET_ARM64" ] && [ "$ASSET_ARM64" != "null" ]; then
              local hash_arm64; hash_arm64=$(remote_sha256 "$ASSET_ARM64")
              local au_arm64_url="${repo_url}/releases/download/v\$version/zedg-zh-cn-windows-aarch64-v\$version.zip"
              local au_arm64_hash="${repo_url}/releases/download/v\$version/sha256sums.txt"
              local au_arm64_regex='([a-f0-9]{64})\s+zedg-zh-cn-windows-aarch64-v\$version\.zip'
              manifest=$(echo "$manifest" | jq \
                --arg url   "$ASSET_ARM64" \
                --arg hash  "$hash_arm64" \
                --arg au_url   "$au_arm64_url" \
                --arg au_hash  "$au_arm64_hash" \
                --arg au_regex "$au_arm64_regex" \
                '.architecture.arm64 = {url: $url, hash: $hash} |
                 .autoupdate.architecture.arm64 = {url: $au_url, hash: {url: $au_hash, regex: $au_regex}}')
            fi

            echo "$manifest" > "$out"
            echo "已生成 $(basename "$out")：$tag (prerelease=$is_pre)"
          }

          # ── 判断模式与目标版本 ─────────────────────────────────────
          MODE="${INPUT_MODE:-auto}"
          TARGET_TAG=""
          IS_PRE="false"

          if [ "$EVENT" = "release" ]; then
            TARGET_TAG="$EVENT_TAG"
            IS_PRE="$EVENT_IS_PRE"
            MODE="auto"
          fi

          mkdir -p /tmp/manifests

          if [ "$MODE" = "both" ]; then
            STABLE_TAG=$(curl -s "https://api.github.com/repos/${GH_REPO}/releases/latest" | jq -r .tag_name)
            PRE_TAG=$(curl -s "https://api.github.com/repos/${GH_REPO}/releases?per_page=20" \
              | jq -r '[.[]|select(.prerelease)][0].tag_name // empty')
            echo "both 模式：stable=$STABLE_TAG  prerelease=${PRE_TAG:-（无）}"
            make_manifest "$STABLE_TAG" "false" /tmp/manifests/zedg.json
            [ -n "$PRE_TAG" ] && make_manifest "$PRE_TAG" "true" /tmp/manifests/zedg-preview.json
          else
            if [ -z "$TARGET_TAG" ] && [ -n "$INPUT_TAG" ]; then
              TARGET_TAG="$INPUT_TAG"
              IS_PRE=$(curl -s "https://api.github.com/repos/${GH_REPO}/releases/tags/$TARGET_TAG" \
                | jq -r '.prerelease // false')
            elif [ -z "$TARGET_TAG" ]; then
              TARGET_TAG=$(curl -s "https://api.github.com/repos/${GH_REPO}/releases/latest" | jq -r .tag_name)
              IS_PRE="false"
            fi
            [ "$MODE" = "stable" ]     && IS_PRE="false"
            [ "$MODE" = "prerelease" ] && IS_PRE="true"

            if [ "$IS_PRE" = "true" ]; then
              make_manifest "$TARGET_TAG" "true"  /tmp/manifests/zedg-preview.json
            else
              make_manifest "$TARGET_TAG" "false" /tmp/manifests/zedg.json
            fi
          fi

          # ── 推送到 x6nux/scoop-zedg ───────────────────────────────
          git clone --depth 1 "$BUCKET_REPO" /tmp/scoop-zedg
          cd /tmp/scoop-zedg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp /tmp/manifests/*.json .
          git add *.json

          if git diff --cached --quiet; then
            echo "Manifest 无变化，跳过推送"
          else
            FILES=$(cd /tmp/manifests && ls ./*.json | xargs -I{} basename {} .json | tr '\n' ' ')
            git commit -m "chore: 更新 ${FILES% }"
            git push
          fi
